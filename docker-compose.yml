services:
  db:
    image: postgres:16
    container_name: fire_dispatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fire_dispatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire_dispatch_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app

  agents:
    build:
      context: .
      dockerfile: agents_service/Dockerfile
    container_name: fire_dispatch_agents
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./:/app

volumes:
  postgres_data:
